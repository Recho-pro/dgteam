upstream dgteam_query_api {
    server 127.0.0.1:9765;
    keepalive 32;
}

upstream dgteam_publish_api {
    server 127.0.0.1:9865;
    keepalive 8;
}

upstream dgteam_wechat_official {
    server 127.0.0.1:8975;
    keepalive 8;
}

upstream dgteam_wechat_clawbot {
    server 127.0.0.1:8965;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name dgtdnb.com www.dgtdnb.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dgtdnb.com www.dgtdnb.com;

    ssl_certificate /etc/letsencrypt/live/dgtdnb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dgtdnb.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    access_log /var/log/nginx/dgteam.access.log;
    error_log /var/log/nginx/dgteam.error.log warn;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;

    location = /wechat/official/callback {
        proxy_pass http://dgteam_wechat_official;
        proxy_request_buffering off;
    }

    location = /wecom/kf/callback {
        proxy_pass http://dgteam_wechat_clawbot;
        proxy_request_buffering off;
    }

    location = /health/query {
        proxy_pass http://dgteam_query_api/health;
    }

    location = /health/official {
        proxy_pass http://dgteam_wechat_official/health;
    }

    location = /health/publish {
        proxy_pass http://dgteam_publish_api/health;
    }

    location /publish-api/ {
        proxy_pass http://dgteam_publish_api/;
        proxy_buffering off;
    }

    location = /health/clawbot {
        proxy_pass http://dgteam_wechat_clawbot/health;
    }

    location / {
        proxy_pass http://dgteam_query_api;
        proxy_buffering off;
    }
}
