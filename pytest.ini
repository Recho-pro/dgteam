[pytest]
testpaths = tests
markers =
    unit: Fast pure-logic tests.
    db_contract: Database schema, index, and retention contract tests.
    query_contract: Query API contract and regression tests.
    wechat_regression: WeChat Official Account regression tests.
    release_contract: Release, deploy, and rollback contract tests.
    e2e: Browser-level end-to-end coverage for query_ui.
    smoke: Heavy linked-chain smoke coverage.
